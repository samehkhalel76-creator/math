<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مغامرة الأعداد - رياضيات الصف الثالث</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .ui-panel {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            font-family: sans-serif;
            text-align: center;
            z-index: 1000;
            pointer-events: none;
            border: 2px solid #FFD700;
        }
        #instructions {
            bottom: 30px;
            top: auto;
            font-size: 1.1em;
            background: rgba(0, 121, 107, 0.9);
        }
        #win-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        button {
            padding: 12px 24px;
            cursor: pointer;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 id="goal-text" style="margin: 0 0 5px 0;">المهمة: كوّن العدد 1245</h2>
        <p style="margin: 0; font-size: 1.4em;">المجموع الحالي: <span id="current-val" style="color: #00E676; font-weight: bold;">0</span></p>
    </div>

    <div class="ui-panel" id="instructions">
        استخدم الماوس للنقر على الكرات وتجميع قيمتها
    </div>

    <div id="win-modal">
        <h1 style="color: #2E7D32;">أحسنت يا بطل! 🏆</h1>
        <p>لقد نجحت في تكوين العدد 1245 بنجاح.</p>
        <button onclick="location.reload()">لعب مرة أخرى 🔄</button>
    </div>

    <script>
        let currentTotal = 0;
        const goal = 1245;

        // مكون مخصص للتعامل مع النقر المباشر
        AFRAME.registerComponent('clickable-score', {
            schema: {
                value: {type: 'int'}
            },
            init: function () {
                this.el.addEventListener('click', (evt) => {
                    if (!this.el.getAttribute('visible')) return;
                    
                    currentTotal += this.data.value;
                    document.getElementById('current-val').innerText = currentTotal;
                    
                    // إخفاء الكرة
                    this.el.setAttribute('visible', false);
                    // تعطيل التصادم معها
                    this.el.removeAttribute('class'); 
                    
                    this.checkWin();
                });

                // تأثير عند مرور الماوس
                this.el.addEventListener('mouseenter', () => {
                    this.el.setAttribute('scale', '1.1 1.1 1.1');
                });
                this.el.addEventListener('mouseleave', () => {
                    this.el.setAttribute('scale', '1 1 1');
                });
            },
            checkWin: function() {
                const goalText = document.getElementById('goal-text');
                if (currentTotal === goal) {
                    goalText.innerText = "رائع! اكتمل العدد المطلوب";
                    document.getElementById('win-modal').style.display = 'block';
                } else if (currentTotal > goal) {
                    goalText.innerText = "تجاوزت العدد! المجموع: " + currentTotal;
                    goalText.style.color = "#FF5252";
                    setTimeout(() => location.reload(), 2000);
                }
            }
        });
    </script>

    <!-- تم ضبط rayOrigin: mouse لضمان عمل الماوس على الكمبيوتر -->
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .target">
        <a-entity environment="preset: forest; dressingAmount: 200;"></a-entity>

        <a-camera>
            <!-- مؤشر بصري فقط لمن يستخدم النظارة -->
            <a-entity cursor="fuse: false"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #FF5252; shader: flat"
                      raycaster="objects: .target">
            </a-entity>
        </a-camera>

        <!-- Thousands -->
        <a-sphere class="target" clickable-score="value: 1000" position="-3 2 -5" radius="0.7" color="#00C853">
            <a-text value="1000" align="center" position="0 0 0.8" scale="2 2 2"></a-text>
        </a-sphere>

        <!-- Hundreds -->
        <a-sphere class="target" clickable-score="value: 100" position="-1 2.5 -6" radius="0.6" color="#2962FF">
            <a-text value="100" align="center" position="0 0 0.7" scale="1.5 1.5 1.5"></a-text>
        </a-sphere>
        <a-sphere class="target" clickable-score="value: 100" position="1.5 3 -5.5" radius="0.6" color="#2962FF">
            <a-text value="100" align="center" position="0 0 0.7" scale="1.5 1.5 1.5"></a-text>
        </a-sphere>

        <!-- Tens -->
        <a-sphere class="target" clickable-score="value: 10" position="3 1.5 -4" radius="0.5" color="#FFD600">
            <a-text value="10" align="center" color="#000" position="0 0 0.6" scale="1.2 1.2 1.2"></a-text>
        </a-sphere>
        <a-sphere class="target" clickable-score="value: 10" position="4 3 -6" radius="0.5" color="#FFD600">
            <a-text value="10" align="center" color="#000" position="0 0 0.6" scale="1.2 1.2 1.2"></a-text>
        </a-sphere>
        <a-sphere class="target" clickable-score="value: 10" position="2 4 -7" radius="0.5" color="#FFD600">
            <a-text value="10" align="center" color="#000" position="0 0 0.6" scale="1.2 1.2 1.2"></a-text>
        </a-sphere>
        <a-sphere class="target" clickable-score="value: 10" position="-2 3.5 -4" radius="0.5" color="#FFD600">
            <a-text value="10" align="center" color="#000" position="0 0 0.6" scale="1.2 1.2 1.2"></a-text>
        </a-sphere>

        <!-- Ones -->
        <a-sphere class="target" clickable-score="value: 1" position="0 4 -8" radius="0.4" color="#D50000">
            <a-text value="1" align="center" position="0 0 0.5" scale="1 1 1"></a-text>
        </a-sphere>
        <a-sphere class="target" clickable-score="value: 1" position="-4 1.5 -3.5" radius="0.4" color="#D50000">
            <a-text value="1" align="center" position="0 0 0.5" scale="1 1 1"></a-text>
        </a-sphere>
        <a-sphere class="target" clickable-score="value: 1" position="2 1 -3.5" radius="0.4" color="#D50000">
            <a-text value="1" align="center" position="0 0 0.5" scale="1 1 1"></a-text>
        </a-sphere>
        <a-sphere class="target" clickable-score="value: 1" position="-2 5 -6" radius="0.4" color="#D50000">
            <a-text value="1" align="center" position="0 0 0.5" scale="1 1 1"></a-text>
        </a-sphere>
        <a-sphere class="target" clickable-score="value: 1" position="4 1 -5" radius="0.4" color="#D50000">
            <a-text value="1" align="center" position="0 0 0.5" scale="1 1 1"></a-text>
        </a-sphere>

        <a-light type="ambient" color="#FFF"></a-light>
    </a-scene>
</body>
</html>
